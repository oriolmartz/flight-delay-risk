<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="650" viewBox="0 0 1280 650" role="img" aria-labelledby="title desc">
  <title id="title">Flight Delay Risk decision-system architecture</title>
  <desc id="desc">Four-stage architecture connecting official BTS records, leakage-safe temporal evidence, the calibrated Extra Trees artifact, and capacity-aware product surfaces.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#b7791f"/>
    </marker>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#153f61"/>
      <stop offset="1" stop-color="#1f628d"/>
    </linearGradient>
    <style>
      .ui{font-family:Inter,"Segoe UI",Arial,sans-serif}
      .eyebrow{font-size:12px;font-weight:850;letter-spacing:1.8px;fill:#3b86b0}
      .title{font-size:29px;font-weight:850;fill:#102746}
      .subtitle{font-size:15px;fill:#60778d}
      .stage{font-size:12px;font-weight:850;letter-spacing:1.5px;fill:#2e78a5}
      .stage-light{fill:#9bd5f2}
      .card-title{font-size:20px;font-weight:850;fill:#102746}
      .panel-title{font-size:14px;font-weight:800;fill:#153f61}
      .copy{font-size:13px;fill:#5b7185}
      .copy-strong{font-size:13px;font-weight:750;fill:#244963}
      .metric{font-size:12px;font-weight:800;fill:#1c6c8e}
      .dark-title{font-size:20px;font-weight:850;fill:#ffffff}
      .dark-copy{font-size:13px;fill:#d5e8f4}
      .dark-strong{font-size:13px;font-weight:800;fill:#fff3d4}
    </style>
  </defs>

  <rect width="1280" height="650" rx="24" fill="#eef6fd"/>
  <rect x="28" y="28" width="1224" height="594" rx="20" fill="#f9fcff" stroke="#cfe2f1" stroke-width="1.5"/>

  <g class="ui">
    <text x="62" y="69" class="eyebrow">V1.5.0 · PUBLIC ML DECISION SYSTEM</text>
    <text x="62" y="108" class="title">From published schedules to a capacity-aware review queue</text>
    <text x="62" y="137" class="subtitle">Official data → forward-only evidence → calibrated risk → explainable product surfaces</text>

    <g transform="translate(1031 55)">
      <rect width="86" height="34" rx="17" fill="#e6f2fa" stroke="#c5ddec"/>
      <text x="43" y="22" text-anchor="middle" class="metric">SCHEMA V7</text>
      <rect x="96" width="94" height="34" rx="17" fill="#fff3d9" stroke="#e8ca8b"/>
      <text x="143" y="22" text-anchor="middle" class="metric" fill="#8d5a12">108 TESTS</text>
    </g>

    <line x1="306" y1="333" x2="337" y2="333" stroke="#b7791f" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="606" y1="333" x2="637" y2="333" stroke="#b7791f" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="906" y1="333" x2="937" y2="333" stroke="#b7791f" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(58 177)">
      <rect width="248" height="318" rx="18" fill="#ffffff" stroke="#cbdfea" stroke-width="1.5"/>
      <text x="22" y="33" class="stage">01 · DATA CONTRACT</text>
      <text x="22" y="68" class="card-title">BTS 2024 records</text>
      <rect x="18" y="88" width="212" height="81" rx="12" fill="#f0f7fc"/>
      <text x="34" y="115" class="panel-title">Official source</text>
      <text x="34" y="139" class="copy">12 monthly files</text>
      <text x="34" y="159" class="copy-strong">7,079,081 source rows</text>
      <rect x="18" y="181" width="212" height="112" rx="12" fill="#f7fbfe" stroke="#dfebf4"/>
      <text x="34" y="208" class="panel-title">Validate and fingerprint</text>
      <text x="34" y="232" class="copy">schema + source hashes</text>
      <text x="34" y="253" class="copy">remove invalid targets</text>
      <text x="34" y="276" class="copy-strong">6,965,267 clean records</text>
    </g>

    <g transform="translate(358 177)">
      <rect width="248" height="318" rx="18" fill="#ffffff" stroke="#cbdfea" stroke-width="1.5"/>
      <text x="22" y="33" class="stage">02 · TEMPORAL EVIDENCE</text>
      <text x="22" y="68" class="card-title">Forward-only protocol</text>
      <rect x="18" y="88" width="212" height="92" rx="12" fill="#f0f7fc"/>
      <text x="34" y="115" class="panel-title">Chronological blocks</text>
      <text x="34" y="139" class="copy-strong">train → select → calibrate</text>
      <text x="34" y="160" class="copy-strong">→ untouched final test</text>
      <rect x="18" y="192" width="212" height="101" rx="12" fill="#f7fbfe" stroke="#dfebf4"/>
      <text x="34" y="219" class="panel-title">Leakage-safe features</text>
      <text x="34" y="243" class="copy">strictly earlier flight dates</text>
      <text x="34" y="264" class="copy">schedule density + recency</text>
      <text x="34" y="285" class="copy">explicit unseen fallbacks</text>
    </g>

    <g transform="translate(658 177)">
      <rect width="248" height="318" rx="18" fill="#ffffff" stroke="#cbdfea" stroke-width="1.5"/>
      <text x="22" y="33" class="stage">03 · MODEL ARTIFACT</text>
      <text x="22" y="68" class="card-title">Frozen before test</text>
      <rect x="18" y="88" width="212" height="81" rx="12" fill="#f0f7fc"/>
      <text x="34" y="115" class="panel-title">Seven candidates</text>
      <text x="34" y="139" class="copy">shared selection period</text>
      <text x="34" y="159" class="copy-strong">Extra Trees selected</text>
      <rect x="18" y="181" width="212" height="112" rx="12" fill="#f7fbfe" stroke="#dfebf4"/>
      <text x="34" y="208" class="panel-title">Versioned release</text>
      <text x="34" y="232" class="copy-strong">168,519-flight refit</text>
      <text x="34" y="253" class="copy">sigmoid calibration</text>
      <text x="34" y="274" class="copy">feature maps + lineage</text>
    </g>

    <g transform="translate(958 177)">
      <rect width="248" height="318" rx="18" fill="url(#header)" stroke="#164a73" stroke-width="1.5"/>
      <text x="22" y="33" class="stage stage-light">04 · DECISION DELIVERY</text>
      <text x="22" y="68" class="dark-title">Risk, evidence, action</text>
      <rect x="18" y="88" width="212" height="92" rx="12" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="34" y="115" class="dark-strong">Calibrated probability</text>
      <text x="34" y="139" class="dark-copy">route baseline + support</text>
      <text x="34" y="160" class="dark-copy">local model contributions</text>
      <rect x="18" y="192" width="212" height="101" rx="12" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="34" y="219" class="dark-strong">Top-10% review policy</text>
      <text x="34" y="243" class="dark-copy">Priority / Watch / Routine</text>
      <text x="34" y="264" class="dark-copy">Streamlit EN/ES + PDF</text>
      <text x="34" y="285" class="dark-copy">FastAPI + CSV export</text>
    </g>

    <g transform="translate(58 522)">
      <rect width="1148" height="72" rx="14" fill="#e8f3fa" stroke="#c4ddeb"/>
      <text x="22" y="29" class="stage">RELEASE GUARDRAILS</text>
      <text x="22" y="52" class="copy-strong">50,453-flight untouched test</text>
      <circle cx="283" cy="47" r="3" fill="#b7791f"/>
      <text x="300" y="52" class="copy-strong">3 temporal folds</text>
      <circle cx="472" cy="47" r="3" fill="#b7791f"/>
      <text x="489" y="52" class="copy-strong">weekly block bootstrap</text>
      <circle cx="704" cy="47" r="3" fill="#b7791f"/>
      <text x="721" y="52" class="copy-strong">PSI drift monitoring</text>
      <circle cx="916" cy="47" r="3" fill="#b7791f"/>
      <text x="933" y="52" class="copy-strong">health + request logging</text>
    </g>

    <text x="632" y="615" text-anchor="middle" class="metric">INVARIANT · test outcomes never influence features, selection, calibration or policy fitting</text>
  </g>
</svg>

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run bilingual UI smoke
        run: python -c "from scripts.streamlit_smoke import main; raise SystemExit(main())"
      - name: Run release quality gate
        run: python -m scripts.quality_gate
      - name: Training smoke test
        run: python -m scripts.run_local_demo
      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t flightrisk-api:ci .

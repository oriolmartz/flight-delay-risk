name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile
        run: python -m compileall -q app src scripts tests
      - name: Run tests
        run: pytest -q
      - name: Training smoke test
        run: python -m scripts.run_local_demo
      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t flightrisk-api:ci .
